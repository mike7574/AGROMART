<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — AgroMart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="sign-in">
  <main class="container" style="max-width:24rem;padding-top:3rem;padding-bottom:3rem;">
    <h1 class="page-title">Sign in</h1>
    <div class="acct-card">
      <form id="signInForm" class="form-stack">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <p id="signInError" class="muted" style="color:var(--destructive);min-height:1.25rem;"></p>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign in</button>
      </form>
      <p style="margin-top:1rem;font-size:0.875rem;"><a href="sign-up.html">Create account</a> · <a href="index.html">Home</a></p>
    </div>
  </main>
  <script type="module" src="js/storefront-entry.js"></script>
</body>
</html>
